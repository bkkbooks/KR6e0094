  - {type: variant, offset: 6978, length: 172, content: 然此具德門中，一法法爾，性具善、惡。故《經》曰：於一微塵中，各示那由他無數億諸佛於中而說法。於一微塵中，現無量佛國須彌金剛圍世間不迫作。於一微塵中，現有三惡道、天、人、阿修羅，各各受業報，如斯並是實事，非變化作，是法性實德，法爾如此也。如上之義去情，深思可知。然此十門，同時相應為一緣起，就初門中有十義圓融，隨一各具餘一切義。如初門既爾，餘理法隱顯等九門亦然，但隨門異耳，是故一一門中各有十、百、千等。思之可見。, 甲: ''}
