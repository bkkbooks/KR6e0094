front:
  text: 華嚴發菩提心章凡例此章別有異本而文畫多紕謬字句頗缺脫今以梅尾南都諸本隨義參訂改正筆削非私意也每值文有大異繫之鼇頭法界義鏡曰香象大師菩提心章載法界觀門以明發心相故今章明第四表德中有五門自第一真空觀至第三周遍含容觀全舉彼觀文耳也又如圓超疏鈔録凝然華嚴宗要義永超東域傳燈録及高山寺藏目等皆標為賢首撰也世別有題為華嚴三昧章者然其文大同此章今謂是乃後學誤以今章殘編為三昧章者耶故探玄記說十重唯識曰上來所明約教就解而說若就觀行亦有十重如一卷華嚴三昧中說云然考世所題為三昧章者總無其文故知彼非其於探玄記所指者必矣正德四年納錦綾山曼陀羅院
